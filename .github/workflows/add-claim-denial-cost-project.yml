name: Add Claim Denial Cost Portfolio Project

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-claim-denial-cost-project.yml'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add Project 11 card
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          if 'PROJECT 11 · NEW' in text:
              print('Project 11 already present.')
          else:
              old = 'href="./projects/previsit-eligibility-clean-claim-control.html">Open branded case study →</a></article></div></div></section>'
              new = 'href="./projects/previsit-eligibility-clean-claim-control.html">Open branded case study →</a></article><article class="card new"><span class="number">PROJECT 11 · NEW</span><h3>Claim Denial Cost &amp; Prevention Control Intelligence™</h3><p>Examines the hidden operational cost of claim denials through transparent rework-cost modeling, standardized root-cause categories, queue ownership, correction and appeal readiness, patient-balance safeguards, synthetic UAT, KPIs, and verified prevention. The project uses simulated no-PHI data and does not claim billing, coding, payer, or revenue-cycle authority.</p><div class="tags"><span>Claim Denials</span><span>Rework Cost</span><span>Root Cause</span><span>Denial Prevention</span></div><a class="open" href="./projects/claim-denial-cost-prevention-control.html">Open branded case study →</a></article></div></div></section>'
              if old not in text:
                  raise SystemExit('Expected Project 10 closing marker was not found.')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
              print('Project 11 card added.')
          PY
      - name: Remove one-time workflow
        run: rm .github/workflows/add-claim-denial-cost-project.yml
      - name: Commit portfolio update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-claim-denial-cost-project.yml
          git commit -m "Add claim denial cost prevention project to portfolio"
          git push
