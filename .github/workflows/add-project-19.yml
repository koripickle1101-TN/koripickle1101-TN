name: Add Project 19 to Portfolio

on:
  push:
    paths:
      - '.github/workflows/add-project-19.yml'

permissions:
  contents: write

jobs:
  build-and-update:
    if: github.event.head_commit.message == 'Add Project 19 portfolio updater'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PDF renderer
        run: python -m pip install --disable-pip-version-check weasyprint
      - name: Generate branded Project 19 PDF
        run: weasyprint projects/revenue-cycle-control-chain-patient-financial-closure.html projects/Kori_Pickle_Revenue_Cycle_Control_Chain_Case_Study_2026.pdf
      - name: Insert Project 19 card
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '<article class="card new"><span class="number">PROJECT 18 · NEW</span>'
          card = '''<article class="card new"><span class="number">PROJECT 19 · NEW</span><h3>Revenue Cycle Control Chain &amp; Patient Financial Closure Intelligence™</h3><p>Converts a simplified RCM workflow into a closed-loop control system spanning registration, exact-plan readiness, authorization, documentation, charge capture, claim submission, claim status, adjudication, remittance, denial feedback, payment posting, patient-balance safeguards, dependency resets, synthetic UAT, and verified closure.</p><div class="tags"><span>Revenue Cycle</span><span>Claim Controls</span><span>Denial Feedback</span><span>Patient Financial Experience</span></div><a class="open" href="./projects/revenue-cycle-control-chain-patient-financial-closure.html">Open branded case study →</a></article>'''

          if 'PROJECT 19 · NEW' in text:
              print('Project 19 is already present; no index change needed.')
          else:
              start = text.find(marker)
              if start == -1:
                  raise SystemExit('Project 18 marker not found.')
              close = text.find('</article>', start)
              if close == -1:
                  raise SystemExit('Project 18 closing tag not found.')
              insert_at = close + len('</article>')
              text = text[:insert_at] + '\n' + card + text[insert_at:]
              path.write_text(text, encoding='utf-8')
      - name: Remove one-time updater and commit portfolio changes
        run: |
          rm -f .github/workflows/add-project-19.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Project 19 revenue cycle portfolio card and PDF [skip ci]"
          git push
