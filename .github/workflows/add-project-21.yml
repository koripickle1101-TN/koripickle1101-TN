name: Add Project 21 to Portfolio

on:
  push:
    paths:
      - '.github/workflows/add-project-21.yml'

permissions:
  contents: write

jobs:
  build-and-update:
    if: github.event.head_commit.message == 'Add Project 21 portfolio updater'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PDF renderer
        run: python -m pip install --disable-pip-version-check weasyprint
      - name: Generate branded Project 21 PDF
        run: weasyprint projects/digital-twin-workflow-intelligence.html projects/Kori_Pickle_Digital_Twin_Workflow_Intelligence_Case_Study_2026.pdf
      - name: Insert Project 21 card
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '<article class="card new"><span class="number">PROJECT 20 · NEW</span>'
          card = '''<article class="card new"><span class="number">PROJECT 21 · NEW</span><h3>Digital Twin-Inspired Workflow Intelligence™</h3><p>Translates an emerging healthcare digital-twin concept into a simulated no-PHI specialty-care access model with readiness gates, scenario testing, exception ownership, data-quality controls, interoperability requirements, responsible technology governance, patient-impact safeguards, and recruiter-facing career proof. The project is accurately labeled digital twin-inspired because it does not use live bidirectional data.</p><div class="tags"><span>Digital Twins</span><span>Patient Access</span><span>Health Informatics</span><span>Scenario Analysis</span></div><a class="open" href="./projects/digital-twin-workflow-intelligence.html">Open branded case study →</a></article>'''

          if 'PROJECT 21 · NEW' in text:
              print('Project 21 is already present; no index change needed.')
          else:
              start = text.find(marker)
              if start == -1:
                  raise SystemExit('Project 20 marker not found.')
              close = text.find('</article>', start)
              if close == -1:
                  raise SystemExit('Project 20 closing tag not found.')
              insert_at = close + len('</article>')
              text = text[:insert_at] + '\n' + card + text[insert_at:]
              path.write_text(text, encoding='utf-8')
      - name: Commit portfolio update
        run: |
          if git diff --quiet && git ls-files --error-unmatch projects/Kori_Pickle_Digital_Twin_Workflow_Intelligence_Case_Study_2026.pdf >/dev/null 2>&1; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html projects/Kori_Pickle_Digital_Twin_Workflow_Intelligence_Case_Study_2026.pdf
          git commit -m "Add Project 21 digital twin workflow portfolio card and PDF [skip ci]"
          git push
