name: Add Pre-Visit Eligibility Portfolio Project

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-previsit-eligibility-project.yml'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add Project 10 card
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          if 'PROJECT 10 · NEW' in text:
              print('Project 10 already present.')
          else:
              old = 'href="./projects/hme-eligibility-recurring-coverage-control.html">Open branded case study →</a></article></div></div></section>'
              new = 'href="./projects/hme-eligibility-recurring-coverage-control.html">Open branded case study →</a></article><article class="card new"><span class="number">PROJECT 10 · NEW</span><h3>Pre-Visit Eligibility-to-Clean-Claim Control Intelligence™</h3><p>Follows a simulated patient-access workflow from scheduling and registration through ASC X12 270/271 eligibility, service-specific benefits, referral and authorization readiness, coordination of benefits, patient communication, service gating, denial feedback, and verified closure. The project includes synthetic UAT, evidence-based status design, KPIs, exception ownership, and patient safeguards without claiming payer or billing authority.</p><div class="tags"><span>Patient Access</span><span>270/271</span><span>Authorization</span><span>Denial Prevention</span></div><a class="open" href="./projects/previsit-eligibility-clean-claim-control.html">Open branded case study →</a></article></div></div></section>'
              if old not in text:
                  raise SystemExit('Expected Project 09 closing marker was not found.')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
              print('Project 10 card added.')
          PY
      - name: Remove one-time workflow
        run: rm .github/workflows/add-previsit-eligibility-project.yml
      - name: Commit portfolio update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-previsit-eligibility-project.yml
          git commit -m "Add pre-visit eligibility workflow project to portfolio"
          git push
