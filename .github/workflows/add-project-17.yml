name: Add Project 17 to Portfolio

on:
  push:
    paths:
      - '.github/workflows/add-project-17.yml'

permissions:
  contents: write

jobs:
  build-and-update:
    if: github.event.head_commit.message == 'Add Project 17 portfolio updater'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PDF renderer
        run: python -m pip install --disable-pip-version-check weasyprint
      - name: Generate branded Project 17 PDF
        run: weasyprint projects/integrated-care-journey-responsible-ai-control.html projects/Kori_Pickle_Integrated_Care_Journey_AI_Control_Case_Study_2026.pdf
      - name: Insert Project 17 card
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '<article class="card new"><span class="number">PROJECT 16 · NEW</span>'
          card = '''<article class="card new"><span class="number">PROJECT 17 · NEW</span><h3>Integrated Care Journey &amp; Responsible AI Control Intelligence™</h3><p>Translates a future-healthcare vision into a simulated operational control model for interoperability, patient identity, remote-access barriers, workflow ownership, responsible AI review, automation exceptions, cybersecurity resilience, synthetic UAT, closed-loop KPIs, and patient communication safeguards.</p><div class="tags"><span>Interoperability</span><span>Responsible AI</span><span>Implementation</span><span>Patient Journey</span></div><a class="open" href="./projects/integrated-care-journey-responsible-ai-control.html">Open branded case study →</a></article>'''

          if 'PROJECT 17 · NEW' in text:
              print('Project 17 is already present; no index change needed.')
          else:
              start = text.find(marker)
              if start == -1:
                  raise SystemExit('Project 16 marker not found.')
              close = text.find('</article>', start)
              if close == -1:
                  raise SystemExit('Project 16 closing tag not found.')
              insert_at = close + len('</article>')
              text = text[:insert_at] + '\n' + card + text[insert_at:]
              path.write_text(text, encoding='utf-8')
      - name: Commit portfolio update
        run: |
          if git diff --quiet && git ls-files --error-unmatch projects/Kori_Pickle_Integrated_Care_Journey_AI_Control_Case_Study_2026.pdf >/dev/null 2>&1; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html projects/Kori_Pickle_Integrated_Care_Journey_AI_Control_Case_Study_2026.pdf
          git commit -m "Add Project 17 integrated care journey portfolio card and PDF [skip ci]"
          git push
