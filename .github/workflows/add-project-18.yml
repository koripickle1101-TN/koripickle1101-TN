name: Add Project 18 to Portfolio

on:
  push:
    paths:
      - '.github/workflows/add-project-18.yml'

permissions:
  contents: write

jobs:
  build-and-update:
    if: github.event.head_commit.message == 'Add Project 18 portfolio updater'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PDF renderer
        run: python -m pip install --disable-pip-version-check weasyprint
      - name: Generate branded Project 18 PDF
        run: weasyprint projects/insurance-verification-evidence-patient-financial-clarity.html projects/Kori_Pickle_Insurance_Verification_Evidence_Control_Case_Study_2026.pdf
      - name: Insert Project 18 card
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '<article class="card new"><span class="number">PROJECT 17 · NEW</span>'
          card = '''<article class="card new"><span class="number">PROJECT 18 · NEW</span><h3>Insurance Verification Evidence &amp; Patient Financial Clarity Intelligence™</h3><p>Converts a basic verification checklist into an evidence-based readiness system for exact-plan identification, ASC X12 270/271 eligibility, service-specific benefits, network status, authorization scope, coordination of benefits, patient financial communication, exception ownership, synthetic UAT, and verified closure.</p><div class="tags"><span>Insurance Verification</span><span>Patient Access</span><span>Authorization</span><span>Financial Clarity</span></div><a class="open" href="./projects/insurance-verification-evidence-patient-financial-clarity.html">Open branded case study →</a></article>'''

          if 'PROJECT 18 · NEW' in text:
              print('Project 18 is already present; no index change needed.')
          else:
              start = text.find(marker)
              if start == -1:
                  raise SystemExit('Project 17 marker not found.')
              close = text.find('</article>', start)
              if close == -1:
                  raise SystemExit('Project 17 closing tag not found.')
              insert_at = close + len('</article>')
              text = text[:insert_at] + '\n' + card + text[insert_at:]
              path.write_text(text, encoding='utf-8')
      - name: Commit portfolio update
        run: |
          if git diff --quiet && git ls-files --error-unmatch projects/Kori_Pickle_Insurance_Verification_Evidence_Control_Case_Study_2026.pdf >/dev/null 2>&1; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html projects/Kori_Pickle_Insurance_Verification_Evidence_Control_Case_Study_2026.pdf
          git commit -m "Add Project 18 insurance verification portfolio card and PDF [skip ci]"
          git push