name: Finalize Project 16

on:
  push:
    paths:
      - '.github/workflows/finalize-project-16.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.head_commit.message == 'Finalize Project 16 portfolio page'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove broken PDF links and one-time workflows
        shell: python
        run: |
          from pathlib import Path
          path = Path('projects/medicare-coverage-pathway-claim-routing-intelligence.html')
          text = path.read_text(encoding='utf-8')
          old = '<div class="buttons"><a class="btn primary" href="#case">Review simulated case</a><a class="btn" href="./Kori_Pickle_Medicare_Coverage_Pathway_Case_Study_2026.pdf" target="_blank">Download branded PDF</a></div>'
          new = '<div class="buttons"><a class="btn primary" href="#case">Review simulated case</a><a class="btn" href="../index.html#projects">Return to portfolio</a></div>'
          text = text.replace(old, new)
          old2 = '<section class="download"><div class="wrap"><span class="label" style="color:#000">Branded case study</span><h2>Download the complete 12-page portfolio PDF.</h2><div class="buttons"><a class="btn primary" href="./Kori_Pickle_Medicare_Coverage_Pathway_Case_Study_2026.pdf" target="_blank">Open PDF</a><a class="btn" href="../index.html#projects">Return to portfolio</a></div></div></section>'
          new2 = '<section class="download"><div class="wrap"><span class="label" style="color:#000">Portfolio proof</span><h2>Student-developed Medicare workflow case study.</h2><p>The downloadable recruiter-facing PDF is provided separately with this project.</p><div class="buttons"><a class="btn primary" href="../index.html#projects">Return to portfolio</a></div></div></section>'
          text = text.replace(old2, new2)
          path.write_text(text, encoding='utf-8')
          for workflow in [Path('.github/workflows/add-project-16-card.yml'), Path('.github/workflows/finalize-project-16.yml')]:
              if workflow.exists():
                  workflow.unlink()
      - name: Commit finalization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize Project 16 Medicare portfolio page [skip ci]"
          git push
