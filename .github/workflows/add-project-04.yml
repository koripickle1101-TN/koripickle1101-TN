name: Add Portfolio Project 04

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-project-04.yml'

permissions:
  contents: write

jobs:
  add-project:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Add Project 04 to index
        run: python tools/add_project_04.py

      - name: Commit portfolio update
        run: |
          if git diff --quiet; then
            echo "No index update needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add 837-to-835 case study to portfolio projects"
          git push
