name: Add Portfolio Project 04

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  add-project:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Add Project 04 to index
        run: python tools/add_project_04.py

      - name: Commit portfolio update to branch
        run: |
          if git diff --quiet; then
            echo "No index update needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add 837-to-835 case study to portfolio projects"
          git push origin HEAD:${{ github.head_ref }}
