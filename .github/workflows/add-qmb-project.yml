name: Add QMB Patient Billing Protection Portfolio Project

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-qmb-project.yml'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add Project 12 card
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          if 'PROJECT 12 · NEW' in text:
              print('Project 12 already present.')
          else:
              marker = 'PROJECT 11 · NEW'
              pos = text.find(marker)
              if pos < 0:
                  raise SystemExit('Project 11 marker was not found.')
              close = text.find('</div></div></section>', pos)
              if close < 0:
                  raise SystemExit('Projects section closing marker was not found.')
              card = '<article class="card new"><span class="number">PROJECT 12 · NEW</span><h3>QMB Cost-Sharing Protection &amp; Patient Billing Control Intelligence™</h3><p>Follows a simulated Qualified Medicare Beneficiary workflow from Medicare eligibility and date-specific QMB identification through patient-balance suppression, remittance reconciliation, Medicaid follow-up, refunds, collection safeguards, vendor controls, synthetic UAT, KPIs, and verified closure. The project demonstrates patient-protection and systems-thinking skills without claiming Medicare, Medicaid, billing, payer, legal, or compliance authority.</p><div class="tags"><span>Medicare Eligibility</span><span>QMB</span><span>Patient Protection</span><span>Revenue Cycle</span></div><a class="open" href="./projects/qmb-patient-billing-protection-control.html">Open branded case study →</a></article>'
              text = text[:close] + card + text[close:]
              path.write_text(text, encoding='utf-8')
              print('Project 12 card added.')
          PY
      - name: Remove one-time workflow
        run: rm .github/workflows/add-qmb-project.yml
      - name: Commit portfolio update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-qmb-project.yml
          git commit -m "Add QMB patient billing protection project to portfolio"
          git push
